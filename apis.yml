  - type: DeveloperPortal
    url: https://developers-test.firsthorizon.com/
- aid: first-horizon:aba-lookup-v1
  name: ABA Lookup v1
  description: >-
    ABA Lookup is a RESTful utility endpoint on First Horizon's API Banking
    platform that validates and resolves U.S. ABA routing transit numbers,
    supporting payment-instruction validation ahead of ACH and wire origination.
    Authorized with OAuth 2.0. Documented in HTML on the developer portal; no
    public OpenAPI specification is downloadable.
  humanURL: https://developers-test.firsthorizon.com/apis/v1/lookups/aba
  tags:
