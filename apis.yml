apis:
- aid: first-horizon:move-money-transfer-v1
  name: Move Money Transfer v1
  description: >-
    Move Money Transfer is First Horizon's RESTful payments-initiation API for
    Treasury Management clients, used to originate and manage funds transfers
    programmatically from an ERP, accounting, or treasury platform. Requests are
    authorized with OAuth 2.0 access tokens and can be exercised in the portal
    sandbox before promotion to a live customer environment. No public OpenAPI
    specification is downloadable; the endpoint is documented in HTML on the API
    Banking developer portal.
  humanURL: https://developers-test.firsthorizon.com/apis/v1/movemoney/transfer
  tags:
  - Payments
  - Money Movement
  - Treasury Management
  - United States
  properties:
  - type: Documentation
    url: https://developers-test.firsthorizon.com/apis/v1/movemoney/transfer
  - type: Authentication
    url: https://developers-test.firsthorizon.com/apis/v0/oauth
  - type: DeveloperPortal
    url: https://developers-test.firsthorizon.com/
- aid: first-horizon:ach-origination
  name: ACH Origination
  description: >-
    The ACH Origination API lets First Horizon Treasury Management clients
    originate ACH transactions directly from their ERP or accounting system via
    a RESTful interface, paired with an ACH Tokenization Solution that replaces
    sensitive bank account numbers with tokens to support security and NACHA
    compliance. Authorized with OAuth 2.0 and available in a sandbox for
    build-and-test. Documented in HTML on the developer portal; no public
    OpenAPI specification is downloadable.
  humanURL: https://developers-test.firsthorizon.com/solutions/ach-tokenization
  tags:
  - ACH
  - Payments
  - Tokenization
  - NACHA
  - United States
  properties:
  - type: Documentation
    url: https://developers-test.firsthorizon.com/solutions/ach-tokenization
  - type: Authentication
    url: https://developers-test.firsthorizon.com/apis/v0/oauth
  - type: DeveloperPortal
    url: https://developers-test.firsthorizon.com/
- aid: first-horizon:account-information
  name: Account Information
  description: >-
    The Account Information API provides Treasury Management clients real-time
    visibility into account information, balances, and transactions through a
    RESTful interface, for reconciliation and cash-position workflows inside a
    client's own platform. Authorized with OAuth 2.0 and exercisable in the
    portal sandbox. Documented in HTML on the API Banking developer portal; no
    public OpenAPI specification is downloadable.
  humanURL: https://developers-test.firsthorizon.com/get-started
  tags:
  - Account Information
  - Balances
  - Transactions
  - Open Banking
