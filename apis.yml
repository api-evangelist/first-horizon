aid: first-horizon
name: First Horizon
kind: company
type: Index
description: >-
  First Horizon Corporation is a Fortune 500 financial services holding company
  headquartered in Memphis, Tennessee. Through First Horizon Bank it provides
  commercial, private, consumer, and mortgage banking, wealth management, and
  capital markets services across the southern United States. First Horizon
  operates a real API Banking developer portal for Treasury Management clients,
  exposing RESTful products for money movement, ACH origination, real-time
  account information, and routing-number lookups, secured with OAuth 2.0 and a
  sandbox for build-and-test integration. Onboarding is partner/relationship
  gated and no OpenAPI/Swagger specifications are publicly downloadable — this
  repository captures the documented API surface honestly, humanURL-only.
