actions:
  apisYmlUpdated: true
  apisBefore: 0
  apisAfter: 5
  specsHarvested: 0
  reason: >-
    Deepened from an empty apis[] to 5 real documented API Banking products,
    each humanURL-only with Documentation + Authentication (OAuth2) pointers,
    plus verified common[] links (developer portal, docs, product page, OAuth).
    No specs harvested because none are publicly downloadable and the portal
